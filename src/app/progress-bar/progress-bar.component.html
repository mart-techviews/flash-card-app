<div class="progress--container">
    
    <div class="progress--bar" [style.width.%]="flashCardService.progressValue">
        <span class="progress--text" *ngIf="flashCardService.progressValue">
            {{flashCardService.progressValue}}%
        </span>
    </div>

    
    

    <span class="progress--count">
        {{flashCardService.currentIndex + 1}} of {{flashCardService.cards.length}}
    </span>
</div>
